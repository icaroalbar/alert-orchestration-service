    SalesforceIntegrationDlqVisibleMessagesAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.naming.prefix}-salesforce-dlq-visible-messages
        AlarmDescription: Alarm when Salesforce DLQ accumulates visible messages above threshold.
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value:
              Fn::GetAtt:
                - SalesforceIntegrationDlq
                - QueueName
        Statistic: Maximum
        Period: ${self:custom.stages.${self:provider.stage}.dlqAlarmPeriodSeconds}
        EvaluationPeriods: ${self:custom.stages.${self:provider.stage}.dlqAlarmEvaluationPeriods}
        Threshold: ${self:custom.stages.${self:provider.stage}.salesforceDlqAlarmThreshold}
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: DlqAlarmTopic
        OKActions:
          - Ref: DlqAlarmTopic
    HubspotIntegrationDlqVisibleMessagesAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.naming.prefix}-hubspot-dlq-visible-messages
        AlarmDescription: Alarm when HubSpot DLQ accumulates visible messages above threshold.
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
