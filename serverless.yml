          - SchedulerExecutionRole
          - Arn
      Export:
        Name: ${self:custom.naming.prefix}-scheduler-execution-role-arn
    MainStateMachineExecutionRoleArn:
      Description: ARN da role de execucao da state machine principal.
      Value:
        Fn::GetAtt:
          - MainStateMachineExecutionRole
          - Arn
      Export:
        Name: ${self:custom.naming.prefix}-state-machine-execution-role-arn
    CollectorExecutionRoleArn:
      Description: ARN da role reservada para a Lambda coletora.
      Value:
        Fn::GetAtt:
          - CollectorExecutionRole
          - Arn
      Export:
