service: alert-orchestration-service
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${self:custom.stages.${self:provider.stage}.region}
  logRetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
  tracing:
    lambda: ${self:custom.stages.${self:provider.stage}.tracing}
  httpApi:
    authorizers:
      sourceRegistryJwtAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${self:custom.stages.${self:provider.stage}.sourceRegistryJwtIssuerUrl}
        audience:
          - ${self:custom.stages.${self:provider.stage}.sourceRegistryJwtAudience}
  environment:
    STAGE: ${self:provider.stage}
    SERVICE_NAME: ${self:service}
    SOURCES_TABLE_NAME: ${self:custom.stages.${self:provider.stage}.sourcesTableName}
    CURSORS_TABLE_NAME: ${self:custom.stages.${self:provider.stage}.cursorsTableName}
    IDEMPOTENCY_TABLE_NAME: ${self:custom.stages.${self:provider.stage}.idempotencyTableName}
    MAP_MAX_CONCURRENCY: ${self:custom.stages.${self:provider.stage}.mapMaxConcurrency}
    COLLECTOR_DEFAULT_CURSOR: ${env:COLLECTOR_DEFAULT_CURSOR, '1970-01-01T00:00:00.000Z'}
    COLLECTOR_POSTGRES_POOL_MAX_CONNECTIONS: ${env:COLLECTOR_POSTGRES_POOL_MAX_CONNECTIONS, '5'}
    COLLECTOR_POSTGRES_POOL_IDLE_TIMEOUT_MS: ${env:COLLECTOR_POSTGRES_POOL_IDLE_TIMEOUT_MS, '10000'}
    COLLECTOR_POSTGRES_POOL_CONNECTION_TIMEOUT_MS: ${env:COLLECTOR_POSTGRES_POOL_CONNECTION_TIMEOUT_MS, '5000'}
    COLLECTOR_MYSQL_POOL_MAX_CONNECTIONS: ${env:COLLECTOR_MYSQL_POOL_MAX_CONNECTIONS, '5'}
    COLLECTOR_MYSQL_POOL_IDLE_TIMEOUT_MS: ${env:COLLECTOR_MYSQL_POOL_IDLE_TIMEOUT_MS, '10000'}
    COLLECTOR_MYSQL_POOL_CONNECTION_TIMEOUT_MS: ${env:COLLECTOR_MYSQL_POOL_CONNECTION_TIMEOUT_MS, '5000'}
    COLLECTOR_MYSQL_QUERY_TIMEOUT_MS: ${env:COLLECTOR_MYSQL_QUERY_TIMEOUT_MS, '5000'}
    OFFICIAL_CUSTOMERS_UPSERT_BATCH_URL: ${env:OFFICIAL_CUSTOMERS_UPSERT_BATCH_URL, 'https://official-bank.internal/customers/upsert-batch'}
    OFFICIAL_CUSTOMERS_UPSERT_TIMEOUT_MS: ${env:OFFICIAL_CUSTOMERS_UPSERT_TIMEOUT_MS, '5000'}
    OFFICIAL_CUSTOMERS_UPSERT_RETRY_MAX_ATTEMPTS: ${env:OFFICIAL_CUSTOMERS_UPSERT_RETRY_MAX_ATTEMPTS, '3'}
    OFFICIAL_CUSTOMERS_UPSERT_RETRY_BASE_DELAY_MS: ${env:OFFICIAL_CUSTOMERS_UPSERT_RETRY_BASE_DELAY_MS, '200'}
    OFFICIAL_CUSTOMERS_UPSERT_RETRY_BACKOFF_RATE: ${env:OFFICIAL_CUSTOMERS_UPSERT_RETRY_BACKOFF_RATE, '2'}
    COLLECTOR_IDEMPOTENCY_TTL_SECONDS: ${env:COLLECTOR_IDEMPOTENCY_TTL_SECONDS, '604800'}
    INTEGRATION_API_TIMEOUT_MS: ${env:INTEGRATION_API_TIMEOUT_MS, '5000'}
    METRICS_NAMESPACE: ${env:METRICS_NAMESPACE, 'AlertOrchestrationService/Runtime'}
    INTEGRATION_TARGETS: ${env:INTEGRATION_TARGETS, 'salesforce|hubspot'}
    CLIENT_EVENTS_TOPIC_ARN:
      Ref: ClientEventsTopic
    SALESFORCE_INTEGRATION_QUEUE_URL:
      Ref: SalesforceIntegrationQueue
    SALESFORCE_INTEGRATION_QUEUE_ARN:
      Fn::GetAtt:
        - SalesforceIntegrationQueue
        - Arn
    HUBSPOT_INTEGRATION_QUEUE_URL:
      Ref: HubspotIntegrationQueue
    HUBSPOT_INTEGRATION_QUEUE_ARN:
      Fn::GetAtt:
        - HubspotIntegrationQueue
        - Arn
    SALESFORCE_INTEGRATION_DLQ_URL:
      Ref: SalesforceIntegrationDlq
    SALESFORCE_INTEGRATION_DLQ_ARN:
      Fn::GetAtt:
        - SalesforceIntegrationDlq
        - Arn
    HUBSPOT_INTEGRATION_DLQ_URL:
      Ref: HubspotIntegrationDlq
    HUBSPOT_INTEGRATION_DLQ_ARN:
      Fn::GetAtt:
        - HubspotIntegrationDlq
        - Arn
  stackTags:
    Service: ${self:service}
    Stage: ${self:provider.stage}
    ManagedBy: serverless-framework

custom:
  auth:
    sourceRegistryReadScope: sources:read
    sourceRegistryWriteScope: sources:write
  naming:
    prefix: ${self:service}-${self:provider.stage}
    schedulerFunctionName: ${self:custom.naming.prefix}-scheduler
    createSourceFunctionName: ${self:custom.naming.prefix}-create-source
    updateSourceFunctionName: ${self:custom.naming.prefix}-update-source
    deleteSourceFunctionName: ${self:custom.naming.prefix}-delete-source
    listSourceFunctionName: ${self:custom.naming.prefix}-list-sources
    orchestrationStateMachineName: ${self:custom.naming.prefix}-orchestration
    orchestrationScheduleRuleName: ${self:custom.naming.prefix}-orchestration-schedule
    orchestrationLogGroupName: /aws/vendedlogs/states/${self:custom.naming.orchestrationStateMachineName}
    orchestrationDashboardName: ${self:custom.naming.prefix}-orchestration-observability
    schedulerRoleName: ${self:custom.naming.prefix}-scheduler-role
    sourceRegistryApiRoleName: ${self:custom.naming.prefix}-source-registry-api-role
    stateMachineRoleName: ${self:custom.naming.prefix}-state-machine-role
    collectorRoleName: ${self:custom.naming.prefix}-collector-role
    salesforceConsumerFunctionName: ${self:custom.naming.prefix}-salesforce-consumer
    hubspotConsumerFunctionName: ${self:custom.naming.prefix}-hubspot-consumer
    salesforceConsumerRoleName: ${self:custom.naming.prefix}-salesforce-consumer-role
    hubspotConsumerRoleName: ${self:custom.naming.prefix}-hubspot-consumer-role
  stages:
    dev:
      region: us-east-1
      logRetentionInDays: 7
      tracing: false
      sourceRegistryJwtIssuerUrl: ${env:SOURCE_REGISTRY_JWT_ISSUER_URL_DEV, 'https://auth.dev.alert-orchestration.internal'}
      sourceRegistryJwtAudience: ${env:SOURCE_REGISTRY_JWT_AUDIENCE_DEV, 'alert-orchestration-service-dev-source-registry-api'}
      sourcesTableName: ${self:service}-dev-sources
      cursorsTableName: ${self:service}-dev-cursors
      idempotencyTableName: ${self:service}-dev-idempotency
      clientEventsTopicName: ${self:service}-dev-client-events
      salesforceQueueName: ${self:service}-dev-salesforce-events
      hubspotQueueName: ${self:service}-dev-hubspot-events
      salesforceIntegrationTargetBaseUrl: ${env:SALESFORCE_INTEGRATION_TARGET_BASE_URL_DEV, 'https://salesforce.dev.internal'}
      hubspotIntegrationTargetBaseUrl: ${env:HUBSPOT_INTEGRATION_TARGET_BASE_URL_DEV, 'https://hubspot.dev.internal'}
      integrationQueueMessageRetentionSeconds: 1209600
      salesforceDlqName: ${self:service}-dev-salesforce-events-dlq
      hubspotDlqName: ${self:service}-dev-hubspot-events-dlq
      integrationDlqMessageRetentionSeconds: 1209600
      dlqAlarmTopicName: ${self:service}-dev-dlq-alarms
      salesforceDlqAlarmThreshold: 1
      hubspotDlqAlarmThreshold: 1
      dlqAlarmPeriodSeconds: 60
      dlqAlarmEvaluationPeriods: 1
      operationalAlarmTopicName: ${self:service}-dev-operational-alarms
      operationalAlarmPeriodSeconds: 60
      operationalAlarmEvaluationPeriods: 1
      lambdaErrorAlarmThreshold: 1
      schedulerDurationAlarmThresholdMs: 25000
      collectorDurationAlarmThresholdMs: 50000
      consumerDurationAlarmThresholdMs: 25000
      orchestrationFailureAlarmThreshold: 1
      orchestrationTimeoutAlarmThreshold: 1
      orchestrationDurationP95AlarmThresholdMs: 300000
      salesforceQueueMaxReceiveCount: 5
      hubspotQueueMaxReceiveCount: 5
      mapMaxConcurrency: 2
      orchestrationScheduleExpression: cron(0/30 * * * ? *)
    stg:
      region: us-east-1
      logRetentionInDays: 14
      tracing: true
      sourceRegistryJwtIssuerUrl: ${env:SOURCE_REGISTRY_JWT_ISSUER_URL_STG, 'https://auth.stg.alert-orchestration.internal'}
      sourceRegistryJwtAudience: ${env:SOURCE_REGISTRY_JWT_AUDIENCE_STG, 'alert-orchestration-service-stg-source-registry-api'}
      sourcesTableName: ${self:service}-stg-sources
      cursorsTableName: ${self:service}-stg-cursors
      idempotencyTableName: ${self:service}-stg-idempotency
      clientEventsTopicName: ${self:service}-stg-client-events
      salesforceQueueName: ${self:service}-stg-salesforce-events
      hubspotQueueName: ${self:service}-stg-hubspot-events
      salesforceIntegrationTargetBaseUrl: ${env:SALESFORCE_INTEGRATION_TARGET_BASE_URL_STG, 'https://salesforce.stg.internal'}
      hubspotIntegrationTargetBaseUrl: ${env:HUBSPOT_INTEGRATION_TARGET_BASE_URL_STG, 'https://hubspot.stg.internal'}
      integrationQueueMessageRetentionSeconds: 1209600
      salesforceDlqName: ${self:service}-stg-salesforce-events-dlq
      hubspotDlqName: ${self:service}-stg-hubspot-events-dlq
      integrationDlqMessageRetentionSeconds: 1209600
      dlqAlarmTopicName: ${self:service}-stg-dlq-alarms
      salesforceDlqAlarmThreshold: 1
      hubspotDlqAlarmThreshold: 1
      dlqAlarmPeriodSeconds: 60
      dlqAlarmEvaluationPeriods: 1
      operationalAlarmTopicName: ${self:service}-stg-operational-alarms
      operationalAlarmPeriodSeconds: 60
      operationalAlarmEvaluationPeriods: 1
      lambdaErrorAlarmThreshold: 1
      schedulerDurationAlarmThresholdMs: 25000
      collectorDurationAlarmThresholdMs: 50000
      consumerDurationAlarmThresholdMs: 25000
      orchestrationFailureAlarmThreshold: 1
      orchestrationTimeoutAlarmThreshold: 1
      orchestrationDurationP95AlarmThresholdMs: 300000
      salesforceQueueMaxReceiveCount: 5
      hubspotQueueMaxReceiveCount: 5
      mapMaxConcurrency: 5
      orchestrationScheduleExpression: cron(0/15 * * * ? *)
    prod:
      region: us-east-1
      logRetentionInDays: 30
      tracing: true
      sourceRegistryJwtIssuerUrl: ${env:SOURCE_REGISTRY_JWT_ISSUER_URL_PROD, 'https://auth.alert-orchestration.internal'}
      sourceRegistryJwtAudience: ${env:SOURCE_REGISTRY_JWT_AUDIENCE_PROD, 'alert-orchestration-service-prod-source-registry-api'}
      sourcesTableName: ${self:service}-prod-sources
      cursorsTableName: ${self:service}-prod-cursors
      idempotencyTableName: ${self:service}-prod-idempotency
      clientEventsTopicName: ${self:service}-prod-client-events
      salesforceQueueName: ${self:service}-prod-salesforce-events
      hubspotQueueName: ${self:service}-prod-hubspot-events
      salesforceIntegrationTargetBaseUrl: ${env:SALESFORCE_INTEGRATION_TARGET_BASE_URL_PROD, 'https://salesforce.internal'}
      hubspotIntegrationTargetBaseUrl: ${env:HUBSPOT_INTEGRATION_TARGET_BASE_URL_PROD, 'https://hubspot.internal'}
      integrationQueueMessageRetentionSeconds: 1209600
      salesforceDlqName: ${self:service}-prod-salesforce-events-dlq
      hubspotDlqName: ${self:service}-prod-hubspot-events-dlq
      integrationDlqMessageRetentionSeconds: 1209600
      dlqAlarmTopicName: ${self:service}-prod-dlq-alarms
      salesforceDlqAlarmThreshold: 5
      hubspotDlqAlarmThreshold: 5
      dlqAlarmPeriodSeconds: 60
      dlqAlarmEvaluationPeriods: 1
      operationalAlarmTopicName: ${self:service}-prod-operational-alarms
      operationalAlarmPeriodSeconds: 60
      operationalAlarmEvaluationPeriods: 1
      lambdaErrorAlarmThreshold: 2
      schedulerDurationAlarmThresholdMs: 25000
      collectorDurationAlarmThresholdMs: 50000
      consumerDurationAlarmThresholdMs: 25000
      orchestrationFailureAlarmThreshold: 2
      orchestrationTimeoutAlarmThreshold: 1
      orchestrationDurationP95AlarmThresholdMs: 420000
      salesforceQueueMaxReceiveCount: 5
      hubspotQueueMaxReceiveCount: 5
      mapMaxConcurrency: 10
      orchestrationScheduleExpression: cron(0/5 * * * ? *)

plugins:
  - serverless-step-functions

functions:
  scheduler:
    name: ${self:custom.naming.schedulerFunctionName}
    handler: dist/handlers/scheduler.handler
    description: Lista fontes elegiveis para processamento incremental.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SchedulerExecutionRole
        - Arn
  collector:
    name: ${self:custom.naming.prefix}-collector
    handler: dist/handlers/collector.handler
    description: Coletora generica acionada por sourceId em cada iteracao do Map State.
    memorySize: 512
    timeout: 60
    role:
      Fn::GetAtt:
        - CollectorExecutionRole
        - Arn
  salesforceConsumer:
    name: ${self:custom.naming.salesforceConsumerFunctionName}
    handler: dist/handlers/salesforce-consumer.handler
    description: Consumidora dedicada para entrega de eventos de clientes na integracao Salesforce.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SalesforceConsumerExecutionRole
        - Arn
    environment:
      INTEGRATION_NAME: salesforce
      SALESFORCE_INTEGRATION_TARGET_BASE_URL: ${self:custom.stages.${self:provider.stage}.salesforceIntegrationTargetBaseUrl}
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - SalesforceIntegrationQueue
              - Arn
          batchSize: 10
          functionResponseType: ReportBatchItemFailures
  hubspotConsumer:
    name: ${self:custom.naming.hubspotConsumerFunctionName}
    handler: dist/handlers/hubspot-consumer.handler
    description: Consumidora dedicada para entrega de eventos de clientes na integracao HubSpot.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - HubspotConsumerExecutionRole
        - Arn
    environment:
      INTEGRATION_NAME: hubspot
      HUBSPOT_INTEGRATION_TARGET_BASE_URL: ${self:custom.stages.${self:provider.stage}.hubspotIntegrationTargetBaseUrl}
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - HubspotIntegrationQueue
              - Arn
          batchSize: 10
          functionResponseType: ReportBatchItemFailures
  createSource:
    name: ${self:custom.naming.createSourceFunctionName}
    handler: dist/handlers/create-source.handler
    description: Endpoint POST para registro de novas fontes no plugin registry.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SourceRegistryApiExecutionRole
        - Arn
    events:
      - httpApi:
          method: post
          path: /sources
          authorizer:
            name: sourceRegistryJwtAuthorizer
            scopes:
              - ${self:custom.auth.sourceRegistryWriteScope}
  updateSource:
    name: ${self:custom.naming.updateSourceFunctionName}
    handler: dist/handlers/update-source.handler
    description: Endpoint PATCH para atualizacao parcial de fontes no plugin registry.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SourceRegistryApiExecutionRole
        - Arn
    events:
      - httpApi:
          method: patch
          path: /sources/{id}
          authorizer:
            name: sourceRegistryJwtAuthorizer
            scopes:
              - ${self:custom.auth.sourceRegistryWriteScope}
  deleteSource:
    name: ${self:custom.naming.deleteSourceFunctionName}
    handler: dist/handlers/delete-source.handler
    description: Endpoint DELETE para desativacao logica de fontes no plugin registry.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SourceRegistryApiExecutionRole
        - Arn
    events:
      - httpApi:
          method: delete
          path: /sources/{id}
          authorizer:
            name: sourceRegistryJwtAuthorizer
            scopes:
              - ${self:custom.auth.sourceRegistryWriteScope}
  listSource:
    name: ${self:custom.naming.listSourceFunctionName}
    handler: dist/handlers/list-sources.handler
    description: Endpoint GET para listagem paginada de fontes no plugin registry.
    memorySize: 256
    timeout: 30
    role:
      Fn::GetAtt:
        - SourceRegistryApiExecutionRole
        - Arn
    events:
      - httpApi:
          method: get
          path: /sources
          authorizer:
            name: sourceRegistryJwtAuthorizer
            scopes:
              - ${self:custom.auth.sourceRegistryReadScope}

stepFunctions:
  stateMachines:
    main:
      name: ${self:custom.naming.orchestrationStateMachineName}
      events:
        - schedule:
            name: ${self:custom.naming.orchestrationScheduleRuleName}
            description: Disparo global da orquestracao principal via EventBridge.
            enabled: true
            rate: ${self:custom.stages.${self:provider.stage}.orchestrationScheduleExpression}
            input:
              trigger: scheduled
              source: eventbridge
              stage: ${self:provider.stage}
              service: ${self:service}
      role:
        Fn::GetAtt:
          - MainStateMachineExecutionRole
          - Arn
      tracingConfig:
        enabled: ${self:custom.stages.${self:provider.stage}.tracing}
      loggingConfig:
        level: ALL
        includeExecutionData: true
        destinations:
          - Fn::Sub: ${MainOrchestrationStateMachineLogGroup.Arn}:*
      definition: ${file(./state-machines/main-orchestration-v1.asl.json)}

resources:
  Resources:
    SchedulerLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.schedulerFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    CreateSourceLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.createSourceFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    UpdateSourceLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.updateSourceFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    DeleteSourceLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.deleteSourceFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    ListSourceLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.listSourceFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    SalesforceConsumerLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.salesforceConsumerFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    HubspotConsumerLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.naming.hubspotConsumerFunctionName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    MainOrchestrationStateMachineLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: ${self:custom.naming.orchestrationLogGroupName}
        RetentionInDays: ${self:custom.stages.${self:provider.stage}.logRetentionInDays}
    SchedulerExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.schedulerRoleName}
        Description: Role de execucao da Lambda Scheduler com privilegio minimo.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-scheduler-dynamodb-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: QueryEligibleSources
                  Effect: Allow
                  Action:
                    - dynamodb:Query
                  Resource:
                    - Fn::GetAtt:
                        - SourcesTable
                        - Arn
                    - Fn::Sub: ${SourcesTable.Arn}/index/active-nextRunAt-index
                - Sid: UpdateNextRunAt
                  Effect: Allow
                  Action:
                    - dynamodb:UpdateItem
                  Resource:
                    - Fn::GetAtt:
                        - SourcesTable
                        - Arn
                - Sid: WriteSchedulerLogs
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.schedulerFunctionName}:*
    MainStateMachineExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.stateMachineRoleName}
        Description: Role de execucao da State Machine principal com privilegio minimo.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: states.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-main-state-machine-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: InvokeSchedulerLambda
                  Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                  Resource:
                    - Fn::GetAtt:
                        - SchedulerLambdaFunction
                        - Arn
                - Sid: InvokeCollectorLambda
                  Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                  Resource:
                    - Fn::GetAtt:
                        - CollectorLambdaFunction
                        - Arn
                - Sid: DeliverStepFunctionsExecutionLogs
                  Effect: Allow
                  Action:
                    - logs:CreateLogDelivery
                    - logs:GetLogDelivery
                    - logs:UpdateLogDelivery
                    - logs:DeleteLogDelivery
                    - logs:ListLogDeliveries
                    - logs:PutResourcePolicy
                    - logs:DescribeResourcePolicies
                    - logs:DescribeLogGroups
                  Resource: '*'
                - Sid: PublishOrchestrationMetrics
                  Effect: Allow
                  Action:
                    - cloudwatch:PutMetricData
                  Resource: '*'
                  Condition:
                    StringEquals:
                      cloudwatch:namespace: AlertOrchestrationService/Orchestration
    CollectorExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.collectorRoleName}
        Description: Role reservada da Lambda coletora com privilegio minimo para ingestao.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-collector-data-access-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: ReadSourceConfiguration
                  Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - Fn::GetAtt:
                        - SourcesTable
                        - Arn
                    - Fn::Sub: ${SourcesTable.Arn}/index/active-nextRunAt-index
                - Sid: ReadAndUpdateCursor
                  Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:UpdateItem
                  Resource:
                    - Fn::GetAtt:
                        - CursorsTable
                        - Arn
                - Sid: WriteIdempotencyClaims
                  Effect: Allow
                  Action:
                    - dynamodb:PutItem
                  Resource:
                    - Fn::GetAtt:
                        - IdempotencyTable
                        - Arn
                - Sid: PublishClientEvents
                  Effect: Allow
                  Action:
                    - sns:Publish
                  Resource:
                    - Ref: ClientEventsTopic
                - Sid: ReadSourceSecrets
                  Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource:
                    - Fn::Sub: arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*
                - Sid: PublishCollectorRuntimeMetrics
                  Effect: Allow
                  Action:
                    - cloudwatch:PutMetricData
                  Resource: '*'
                  Condition:
                    StringEquals:
                      cloudwatch:namespace: ${env:METRICS_NAMESPACE, 'AlertOrchestrationService/Runtime'}
    SourceRegistryApiExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.sourceRegistryApiRoleName}
        Description: Role da API de fontes com privilegio minimo para CRUD da tabela sources.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-source-registry-api-dynamodb-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: CreateSource
                  Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:Scan
                  Resource:
                    - Fn::GetAtt:
                        - SourcesTable
                        - Arn
                - Sid: WriteSourceRegistryApiLogs
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.createSourceFunctionName}:*
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.updateSourceFunctionName}:*
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.deleteSourceFunctionName}:*
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.listSourceFunctionName}:*
    SalesforceConsumerExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.salesforceConsumerRoleName}
        Description: Role reservada da consumidora Salesforce com privilegio minimo para SQS.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-salesforce-consumer-sqs-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: ConsumeSalesforceQueue
                  Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:ChangeMessageVisibility
                    - sqs:GetQueueAttributes
                  Resource:
                    - Fn::GetAtt:
                        - SalesforceIntegrationQueue
                        - Arn
                - Sid: WriteSalesforceConsumerLogs
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.salesforceConsumerFunctionName}:*
                - Sid: PublishSalesforceRuntimeMetrics
                  Effect: Allow
                  Action:
                    - cloudwatch:PutMetricData
                  Resource: '*'
                  Condition:
                    StringEquals:
                      cloudwatch:namespace: ${env:METRICS_NAMESPACE, 'AlertOrchestrationService/Runtime'}
    HubspotConsumerExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.naming.hubspotConsumerRoleName}
        Description: Role reservada da consumidora HubSpot com privilegio minimo para SQS.
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: ${self:custom.naming.prefix}-hubspot-consumer-sqs-policy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: ConsumeHubspotQueue
                  Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:ChangeMessageVisibility
                    - sqs:GetQueueAttributes
                  Resource:
                    - Fn::GetAtt:
                        - HubspotIntegrationQueue
                        - Arn
                - Sid: WriteHubspotConsumerLogs
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.naming.hubspotConsumerFunctionName}:*
                - Sid: PublishHubspotRuntimeMetrics
                  Effect: Allow
                  Action:
                    - cloudwatch:PutMetricData
                  Resource: '*'
                  Condition:
                    StringEquals:
                      cloudwatch:namespace: ${env:METRICS_NAMESPACE, 'AlertOrchestrationService/Runtime'}
    SourcesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.stages.${self:provider.stage}.sourcesTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: sourceId
            AttributeType: S
          - AttributeName: active
            AttributeType: S
          - AttributeName: nextRunAt
            AttributeType: S
        KeySchema:
          - AttributeName: sourceId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: active-nextRunAt-index
            KeySchema:
              - AttributeName: active
                KeyType: HASH
              - AttributeName: nextRunAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
    CursorsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.stages.${self:provider.stage}.cursorsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: source
            AttributeType: S
        KeySchema:
          - AttributeName: source
            KeyType: HASH
        SSESpecification:
          SSEEnabled: true
    IdempotencyTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.stages.${self:provider.stage}.idempotencyTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: deduplicationKey
            AttributeType: S
        KeySchema:
          - AttributeName: deduplicationKey
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
        SSESpecification:
          SSEEnabled: true
    ClientEventsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:custom.stages.${self:provider.stage}.clientEventsTopicName}
        KmsMasterKeyId: alias/aws/sns
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
    CollectorPublishPolicy:
      Type: AWS::IAM::ManagedPolicy
      Properties:
        ManagedPolicyName: ${self:custom.naming.prefix}-collector-sns-publish
        Description: Permissoes de publicacao no topico SNS para a coletora.
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PublishClientEvents
              Effect: Allow
              Action:
                - sns:Publish
              Resource:
                Ref: ClientEventsTopic
    SalesforceIntegrationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:custom.stages.${self:provider.stage}.salesforceQueueName}
        MessageRetentionPeriod: ${self:custom.stages.${self:provider.stage}.integrationQueueMessageRetentionSeconds}
        VisibilityTimeout: 60
        ReceiveMessageWaitTimeSeconds: 20
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
              - SalesforceIntegrationDlq
              - Arn
          maxReceiveCount: ${self:custom.stages.${self:provider.stage}.salesforceQueueMaxReceiveCount}
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Integration
            Value: salesforce
    SalesforceIntegrationDlq:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:custom.stages.${self:provider.stage}.salesforceDlqName}
        MessageRetentionPeriod: ${self:custom.stages.${self:provider.stage}.integrationDlqMessageRetentionSeconds}
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Integration
            Value: salesforce
          - Key: QueueType
            Value: dlq
    HubspotIntegrationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:custom.stages.${self:provider.stage}.hubspotQueueName}
        MessageRetentionPeriod: ${self:custom.stages.${self:provider.stage}.integrationQueueMessageRetentionSeconds}
        VisibilityTimeout: 60
        ReceiveMessageWaitTimeSeconds: 20
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
              - HubspotIntegrationDlq
              - Arn
          maxReceiveCount: ${self:custom.stages.${self:provider.stage}.hubspotQueueMaxReceiveCount}
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Integration
            Value: hubspot
    HubspotIntegrationDlq:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:custom.stages.${self:provider.stage}.hubspotDlqName}
        MessageRetentionPeriod: ${self:custom.stages.${self:provider.stage}.integrationDlqMessageRetentionSeconds}
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}
          - Key: Integration
            Value: hubspot
          - Key: QueueType
            Value: dlq
    IntegrationQueuesPolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - Ref: SalesforceIntegrationQueue
          - Ref: HubspotIntegrationQueue
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: AllowClientEventsTopicToSend
              Effect: Allow
              Principal:
                Service: sns.amazonaws.com
              Action:
                - sqs:SendMessage
              Resource:
                - Fn::GetAtt:
                    - SalesforceIntegrationQueue
                    - Arn
                - Fn::GetAtt:
                    - HubspotIntegrationQueue
                    - Arn
              Condition:
                ArnEquals:
                  aws:SourceArn:
                    Ref: ClientEventsTopic
    SalesforceIntegrationSubscription:
      Type: AWS::SNS::Subscription
      DependsOn:
        - IntegrationQueuesPolicy
      Properties:
        TopicArn:
          Ref: ClientEventsTopic
        Protocol: sqs
        Endpoint:
          Fn::GetAtt:
            - SalesforceIntegrationQueue
            - Arn
        RawMessageDelivery: true
    HubspotIntegrationSubscription:
      Type: AWS::SNS::Subscription
      DependsOn:
        - IntegrationQueuesPolicy
      Properties:
        TopicArn:
          Ref: ClientEventsTopic
        Protocol: sqs
        Endpoint:
          Fn::GetAtt:
            - HubspotIntegrationQueue
            - Arn
        RawMessageDelivery: true
