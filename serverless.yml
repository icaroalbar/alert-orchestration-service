      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:custom.stages.${self:provider.stage}.dlqAlarmTopicName}
        KmsMasterKeyId: alias/aws/sns
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
